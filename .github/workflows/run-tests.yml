name: Run Tests
on:
  pull_request:
    types: [opened, review_requested, synchronize, labeled]
  push:
    branches:
      - "main"
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  run-tests:
    # handbook/* head branches are editor "submit for review" PRs (opened by
    # the handbook app, never review_requested/labeled) — run-tests is a
    # REQUIRED check on main, so without this clause those PRs could never merge.
    if: |
      (github.event.action == 'review_requested' ||
      (github.event.action == 'labeled' && github.event.label.name == 'ci-testing') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'ci-testing'))) ||
      (github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'handbook/')) ||
      (github.event_name == 'push')

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/github-script@v6
        name: Set 'ci-testing' label
        if: github.event.action == 'review_requested'
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ["ci-testing"]
            })
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # >=22.18 for node --test importing .ts (type stripping)
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app
      - name: Typecheck, test, guard, build
        run: pnpm check && pnpm test && pnpm guard && pnpm build
        working-directory: app

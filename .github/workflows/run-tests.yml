name: Run Tests
on:
  pull_request:
    types: [review_requested, synchronize, labeled]
  push:
    branches:
      - "main"
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  run-tests:
    if: |
      (github.event.action == 'review_requested' ||
      (github.event.action == 'labeled' && github.event.label.name == 'ci-testing') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'ci-testing'))) ||
      (github.event_name == 'push')

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/github-script@v9
        name: Set 'ci-testing' label
        if: github.event.action == 'review_requested'
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ["ci-testing"]
            })
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build (no tests)
        run: pnpm run docs:build

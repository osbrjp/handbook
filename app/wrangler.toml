name = "osbr-handbook"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# No datastore: content is git-backed markdown, and access control lives in
# GitHub itself (repo collaborators / org membership — no allow-list in this
# codebase). The Worker is stateless.

# Non-secret vars. DEV_LOGIN is "0" here (prod-safe default); .dev.vars sets it
# to "1" for local dev only. Secrets (COOKIE_ENCRYPTION_KEY, GITHUB_OAUTH_*,
# GITHUB_TOKEN) live in .dev.vars locally and as Worker secrets in prod — never here.
[vars]
DEV_LOGIN = "0"
GITHUB_REPO = "osbrjp/handbook"

# Staging: a separate Worker so a staging deploy can never touch production.
#   pnpm build && npx wrangler deploy --env staging
# Secrets are per-environment: `npx wrangler secret put <NAME> --env staging`
# (COOKIE_ENCRYPTION_KEY, GITHUB_OAUTH_CLIENT_ID/SECRET, GITHUB_TOKEN,
# OAUTH_ORIGIN = the workers.dev URL). NOTE: envs do NOT inherit [vars].
[env.staging]
name = "osbr-handbook-staging"
[env.staging.vars]
DEV_LOGIN = "0"
GITHUB_REPO = "osbrjp/handbook"
# POC period: editor submissions target the POC branch (the code staging is
# built from) so the whole draft→approve→merge loop can be demoed pre-merge.
# SELF-RETIRING: once this branch is deleted (its PR merged), resolveBase()
# automatically falls back to main — no config change needed at merge time.
GITHUB_BRANCH = "i68-handbook-poc"
